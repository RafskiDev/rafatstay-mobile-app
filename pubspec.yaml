name: rafatstay
description: "A new Flutter project."
publish_to: none

version: 1.0.0+11

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  webview_flutter: 4.13.0
  http: ^1.6.0
  flutter_riverpod: ^3.0.3
  smooth_page_indicator: ^1.2.1
  get_storage: ^2.1.1
  path_provider: ^2.0.15
  flutter_localization: ^0.3.3
  flutter_svg: ^2.0.10+1
  permission_handler: ^12.0.1
  carousel_slider: ^5.1.1
  uuid: ^4.5.2
  video_player: ^2.10.1
  share_plus: ^7.2.2
  gal: ^2.3.2
  image_picker: ^1.2.1
  google_sign_in: ^7.2.0
  url_launcher: ^6.3.2
  record: ^6.2.0
  audioplayers: ^6.6.0
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  geolocator: ^14.0.2
  cached_network_image: ^3.4.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
flutter:
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/images/

  fonts:
     - family: Cairo
       fonts:
         - asset: assets/fonts/Cairos/Cairo-VariableFont_slnt,wght.ttf

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icons.jpeg"